name: Clang Format Check
on:
  push:
    branches:
      - main
jobs:
  clang-format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: RafikFarhad/clang-format-github-action@v3
        with:
          sources: "server/*.h,server/*.cpp"
          style: "LLVM"
